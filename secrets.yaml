# Questo è un file secrets.yaml di esempio configuraralo in base alla propria rete e necessità
# This is an example secrets.yaml file configure it according to your own network and needs
# Your Wi-Fi SSID and password
wifi_ssid: "<nome rete wifi>"
wifi_password: "<password wifi>"

# Configurazioni di rete
## Generali
net_subnet: <subent>
net_gtw: <gateway>
net_dns1: <dns1>
net_dns2: <dns2>
## Fancoil soggiorno (esempio)
net_ipfansogg: <ip esp fancoil> 

# Configurazioni AP
## Fancoil soggiorno (esempio)
ap_fansogg: "<password AP>"

# Configurazioni OTA
## Fancoil soggiorno (esempio)
ota_fansogg: "password OTA"
