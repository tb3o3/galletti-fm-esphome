esphome:
  name: ${fc_name}
  friendly_name: ${fc_friendly_name}
  comment: ${fc_comment}
  min_version: 2025.12.0
  project:
    name: "AZ-Delivery.D1Mini-NodeMcu-ESP8266-12F-TTLRS485-GallettuFM"
    version: "1.0.0"


# Configurazione specifica per la piattaforma ESP8266
esp8266:
  board: d1_mini

uart:
  id: uart_bus
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 9600
  stop_bits: 1
  data_bits: 8
  parity: NONE
